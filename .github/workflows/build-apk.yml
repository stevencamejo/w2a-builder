name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL to wrap'
        required: true
      app_name:
        description: 'App name'
        required: true
      package_name:
        description: 'Android package name'
        required: true
      icon_url:
        description: 'Icon image URL (optional, any size)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android WebView project
        run: |
          mkdir -p app/src/main/java/$(echo "${{ github.event.inputs.package_name }}" | tr '.' '/')
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

      - name: Write Gradle wrapper properties
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'GRADLE_PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          networkTimeout=10000
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          GRADLE_PROPS

      - name: Write settings.gradle
        run: |
          cat > settings.gradle << 'SETTINGS'
          rootProject.name = "WebViewApp"
          include ':app'
          SETTINGS

      - name: Write root build.gradle
        run: |
          cat > build.gradle << 'BUILDGRADLE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.3.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          BUILDGRADLE

      - name: Write app/build.gradle
        run: |
          cat > app/build.gradle << 'APPGRADLE'
          apply plugin: 'com.android.application'
          android {
              compileSdk 34
              namespace "${{ github.event.inputs.package_name }}"
              defaultConfig {
                  applicationId "${{ github.event.inputs.package_name }}"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          APPGRADLE

      - name: Download and resize custom icon
        if: ${{ github.event.inputs.icon_url != '' }}
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null || true
          mkdir -p app/src/main/res/mipmap-xxxhdpi app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-mdpi
          curl -fsSL -o /tmp/icon_raw "${{ github.event.inputs.icon_url }}" || true
          if [ -s /tmp/icon_raw ]; then
            for size_dir in "192:xxxhdpi" "144:xxhdpi" "96:xhdpi" "72:hdpi" "48:mdpi"; do
              SIZE=$(echo "$size_dir" | cut -d: -f1)
              DIR=$(echo "$size_dir" | cut -d: -f2)
              convert /tmp/icon_raw -resize "${SIZE}x${SIZE}" -background none -gravity center -extent "${SIZE}x${SIZE}"                 "app/src/main/res/mipmap-${DIR}/ic_launcher.png" 2>/dev/null ||                 cp /tmp/icon_raw "app/src/main/res/mipmap-${DIR}/ic_launcher.png"
              cp "app/src/main/res/mipmap-${DIR}/ic_launcher.png" "app/src/main/res/mipmap-${DIR}/ic_launcher_round.png"
            done
            echo "Custom icon applied successfully"
          fi

      - name: Write AndroidManifest.xml
        run: |
          mkdir -p app/src/main
          ICON_ATTR=""
          ROUND_ICON_ATTR=""
          if [ -n "${{ github.event.inputs.icon_url }}" ]; then
            ICON_ATTR='android:icon="@mipmap/ic_launcher"'
            ROUND_ICON_ATTR='android:roundIcon="@mipmap/ic_launcher_round"'
          fi
          cat > app/src/main/AndroidManifest.xml << MANIFEST
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <queries>
                  <intent><action android:name="android.intent.action.VIEW"/><data android:scheme="https"/></intent>
                  <intent><action android:name="android.intent.action.VIEW"/><data android:scheme="http"/></intent>
                  <intent><action android:name="android.intent.action.VIEW"/><data android:scheme="whatsapp"/></intent>
                  <intent><action android:name="android.intent.action.SENDTO"/><data android:scheme="smsto"/></intent>
                  <intent><action android:name="android.intent.action.DIAL"/></intent>
                  <package android:name="com.whatsapp"/>
                  <package android:name="com.whatsapp.w4b"/>
                  <package android:name="org.telegram.messenger"/>
              </queries>
              <application
                  android:allowBackup="true"
                  android:label="${{ github.event.inputs.app_name }}"
                  ${ICON_ATTR}
                  ${ROUND_ICON_ATTR}
                  android:requestLegacyExternalStorage="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

      - name: Write MainActivity.java
        run: |
          PKG_PATH=$(echo "${{ github.event.inputs.package_name }}" | tr '.' '/')
          mkdir -p "app/src/main/java/${PKG_PATH}"
          cat > "app/src/main/java/${PKG_PATH}/MainActivity.java" << 'MAINACTIVITY'
          package ${{ github.event.inputs.package_name }};
          import android.Manifest;
          import android.app.Activity;
          import android.app.DownloadManager;
          import android.content.ActivityNotFoundException;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Environment;
          import android.webkit.CookieManager;
          import android.webkit.DownloadListener;
          import android.webkit.GeolocationPermissions;
          import android.webkit.PermissionRequest;
          import android.webkit.URLUtil;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.Toast;
          public class MainActivity extends Activity {
              private static final String APP_URL = "${{ github.event.inputs.url }}";
              private static final int REQ_FILE = 1001;
              private static final int REQ_PERM = 1002;
              private WebView webView;
              private ValueCallback<Uri[]> fileCallback;
              private GeolocationPermissions.Callback geoCallback;
              private String geoOrigin;
              private PermissionRequest webPermRequest;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setDatabaseEnabled(true);
                  s.setLoadWithOverviewMode(true);
                  s.setUseWideViewPort(true);
                  s.setBuiltInZoomControls(false);
                  s.setDisplayZoomControls(false);
                  s.setAllowFileAccess(true);
                  s.setAllowContentAccess(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  s.setGeolocationEnabled(true);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                      s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                      CookieManager.getInstance().setAcceptThirdPartyCookies(webView, true);
                  }
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView v, WebResourceRequest req) {
                          return handleUrl(req.getUrl().toString());
                      }
                      @Override
                      @SuppressWarnings("deprecation")
                      public boolean shouldOverrideUrlLoading(WebView v, String url) {
                          return handleUrl(url);
                      }
                  });
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public boolean onShowFileChooser(WebView v,
                              ValueCallback<Uri[]> fc, FileChooserParams params) {
                          if (fileCallback != null) fileCallback.onReceiveValue(null);
                          fileCallback = fc;
                          try { startActivityForResult(params.createIntent(), REQ_FILE); }
                          catch (ActivityNotFoundException e) { fileCallback = null; return false; }
                          return true;
                      }
                      @Override
                      public void onGeolocationPermissionsShowPrompt(String origin,
                              GeolocationPermissions.Callback cb) {
                          if (Build.VERSION.SDK_INT >= 23 &&
                                  checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION)
                                  != PackageManager.PERMISSION_GRANTED) {
                              geoCallback = cb; geoOrigin = origin;
                              requestPermissions(new String[]{
                                  Manifest.permission.ACCESS_FINE_LOCATION,
                                  Manifest.permission.ACCESS_COARSE_LOCATION}, REQ_PERM);
                          } else { cb.invoke(origin, true, false); }
                      }
                      @Override
                      public void onPermissionRequest(PermissionRequest request) {
                          webPermRequest = request;
                          if (Build.VERSION.SDK_INT >= 23) {
                              requestPermissions(new String[]{
                                  Manifest.permission.CAMERA,
                                  Manifest.permission.RECORD_AUDIO}, REQ_PERM);
                          } else { request.grant(request.getResources()); }
                      }
                  });
                  webView.setDownloadListener(new DownloadListener() {
                      @Override
                      public void onDownloadStart(String url, String ua,
                              String cd, String mime, long length) {
                          try {
                              String fname = URLUtil.guessFileName(url, cd, mime);
                              DownloadManager.Request req = new DownloadManager.Request(Uri.parse(url));
                              req.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                              req.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, fname);
                              req.addRequestHeader("Cookie", CookieManager.getInstance().getCookie(url));
                              req.addRequestHeader("User-Agent", ua);
                              req.setMimeType(mime);
                              req.setTitle(fname);
                              DownloadManager dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                              if (dm != null) {
                                  dm.enqueue(req);
                                  Toast.makeText(MainActivity.this, "Descargando: " + fname, Toast.LENGTH_SHORT).show();
                              }
                          } catch (Exception e) { openInBrowser(url); }
                      }
                  });
                  webView.loadUrl(APP_URL);
              }
              private boolean handleUrl(String url) {
                  if (url == null || url.isEmpty()) return false;
                  if (url.startsWith("whatsapp://") || url.startsWith("wapp://") ||
                      url.startsWith("tg://") || url.startsWith("telegram://")) {
                      return launchApp(url);
                  }
                  if (url.startsWith("intent://")) {
                      try {
                          Intent intent = Intent.parseUri(url, Intent.URI_INTENT_SCHEME);
                          intent.addCategory(Intent.CATEGORY_BROWSABLE);
                          startActivity(intent);
                      } catch (Exception e) {
                          String fb = Uri.parse(url).getQueryParameter("browser_fallback_url");
                          if (fb != null) webView.loadUrl(fb);
                      }
                      return true;
                  }
                  if (url.startsWith("tel:") || url.startsWith("sms:") || url.startsWith("smsto:") ||
                      url.startsWith("mailto:") || url.startsWith("market:") ||
                      url.startsWith("fb:") || url.startsWith("twitter:") || url.startsWith("instagram:")) {
                      return launchApp(url);
                  }
                  if (url.startsWith("blob:") || url.startsWith("data:")) return false;
                  if (url.startsWith("http://") || url.startsWith("https://")) {
                      try {
                          String th = Uri.parse(url).getHost();
                          String bh = Uri.parse(APP_URL).getHost();
                          if (th != null && bh != null && (th.equals(bh) || th.endsWith("." + bh))) return false;
                      } catch (Exception ignored) {}
                      openInBrowser(url); return true;
                  }
                  return false;
              }
              private boolean launchApp(String url) {
                  try {
                      Intent i = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                      i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      startActivity(i); return true;
                  } catch (ActivityNotFoundException e) {
                      Toast.makeText(this, "Aplicacion no disponible", Toast.LENGTH_SHORT).show();
                      return false;
                  }
              }
              private void openInBrowser(String url) {
                  try {
                      Intent i = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                      i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      startActivity(i);
                  } catch (Exception ignored) {}
              }
              @Override
              public void onRequestPermissionsResult(int code, String[] perms, int[] results) {
                  boolean ok = results.length > 0 && results[0] == PackageManager.PERMISSION_GRANTED;
                  if (geoCallback != null) {
                      geoCallback.invoke(geoOrigin, ok, false);
                      geoCallback = null; geoOrigin = null;
                  }
                  if (webPermRequest != null) {
                      if (ok) webPermRequest.grant(webPermRequest.getResources());
                      else webPermRequest.deny();
                      webPermRequest = null;
                  }
              }
              @Override
              protected void onActivityResult(int req, int res, Intent data) {
                  if (req == REQ_FILE) {
                      Uri[] uris = null;
                      if (res == RESULT_OK && data != null) {
                          String s = data.getDataString();
                          if (s != null) {
                              uris = new Uri[]{Uri.parse(s)};
                          } else if (data.getClipData() != null) {
                              int n = data.getClipData().getItemCount();
                              uris = new Uri[n];
                              for (int i = 0; i < n; i++)
                                  uris[i] = data.getClipData().getItemAt(i).getUri();
                          }
                      }
                      if (fileCallback != null) { fileCallback.onReceiveValue(uris); fileCallback = null; }
                  }
              }
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack(); else super.onBackPressed();
              }
          }
          MAINACTIVITY

      - name: Write res/layout/activity_main.xml
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'LAYOUT'
          <?xml version="1.0" encoding="utf-8"?>
          <WebView xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/webview"
              android:layout_width="match_parent"
              android:layout_height="match_parent"/>
          LAYOUT

      - name: Write res/values/styles.xml
        run: |
          cat > app/src/main/res/values/styles.xml << 'STYLES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.NoTitleBar.Fullscreen"/>
          </resources>
          STYLES

      - name: Write res/values/strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'STRINGS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">${{ github.event.inputs.app_name }}</string>
          </resources>
          STRINGS

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: |
          chmod +x ./gradlew 2>/dev/null || true
          gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
